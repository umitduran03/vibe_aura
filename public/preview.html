<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VibeCheckr - V-Wave Kalkan Önizlemesi</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #050510; /* Vibecheckr koyu uzay mavisi/siyahı */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: sans-serif;
    }
    
    .wave-img {
      width: 250px;
      height: auto;
      /* mix-blend-mode kaldırıldı çünkü PNG artık transparan! */
      animation: pulse-wave 1.8s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 15px rgba(139,92,246,0.3));
    }

    @keyframes pulse-wave {
      0% { transform: scale(0.95); opacity: 0.7; }
      100% { transform: scale(1.02); opacity: 1; filter: drop-shadow(0 0 25px rgba(236,72,153,0.5)); }
    }
    
  </style>
</head>
<body>
  <!-- Senin kaydettiğin transparan resim -->
  <img src="./v-wave.png" class="wave-img" alt="V-Wave">
</body>
</html>
